<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betten-Radar ULTIMATE | Helios Duisburg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --helios-green: #82bc00;
            --helios-dark-green: #6a9a00;
            --helios-blue: #004a99;
            --glass-white: rgba(255, 255, 255, 0.85);
            --glass-heavy: rgba(255, 255, 255, 0.95);
        }
        
        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #0f172a;
            margin: 0;
        }

        .liquid-glass {
            background: var(--glass-white);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }

        .status-pulse {
            animation: pulse-ring 2.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        .tab-active {
            background: var(--helios-green) !important;
            color: white !important;
            box-shadow: 0 8px 20px -5px rgba(130, 188, 0, 0.5);
            transform: translateY(-2px);
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .drag-handle {
            cursor: grab;
            color: #94a3b8;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        
        tr.dragging {
            opacity: 0.5;
            background: #f1f5f9;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .liquid-glass { border: 1px solid #333 !important; box-shadow: none !important; backdrop-filter: none !important; background: white !important; border-radius: 0 !important; }
            .container { max-width: 100% !important; width: 100% !important; margin: 0 !important; }
            table { width: 100% !important; border-collapse: collapse; }
            th { border-bottom: 3px solid #000 !important; color: black !important; padding: 10px !important; font-weight: bold !important; }
            td { border-bottom: 1px solid #000 !important; padding: 10px !important; color: black !important; }
            input, select { border: none !important; appearance: none; background: transparent !important; font-weight: bold !important; width: auto !important; color: black !important; }
            .drag-handle { display: none !important; }
        }
    </style>
</head>
<body class="p-3 md:p-8 lg:p-10">

<div class="max-w-7xl mx-auto container">
    
    <!-- MASTER DASHBOARD -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-10 no-print">
        
        <!-- ZNA BELASTUNGS-INDEX -->
        <div id="zna-status-panel" class="lg:col-span-1 liquid-glass rounded-[2.5rem] p-7 border-l-[12px] border-[#82bc00] flex flex-col justify-between shadow-xl transition-all duration-500">
            <div>
                <h3 class="text-[11px] font-black text-slate-600 uppercase tracking-[0.2em] mb-3">ZNA Status</h3>
                <div class="flex items-center gap-4">
                    <div id="zna-indicator" class="w-5 h-5 rounded-full bg-[#82bc00] status-pulse"></div>
                    <span id="zna-status-label" class="text-2xl font-black text-slate-900 tracking-tight">Normalbetrieb</span>
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="setZNAStatus('normal', '#82bc00', 'Normalbetrieb')" class="w-10 h-10 rounded-2xl bg-green-100 border border-green-300 flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-sm">🟢</button>
                <button onclick="setZNAStatus('high', '#fbbf24', 'Erhöht')" class="w-10 h-10 rounded-2xl bg-yellow-100 border border-yellow-300 flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-sm">🟡</button>
                <button onclick="setZNAStatus('crit', '#ef4444', 'Kritisch')" class="w-10 h-10 rounded-2xl bg-red-100 border border-red-300 flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-sm">🔴</button>
                <button onclick="setZNAStatus('stop', '#7c3aed', 'Abmeldung')" class="w-10 h-10 rounded-2xl bg-purple-100 border border-purple-300 flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-sm">🟣</button>
            </div>
        </div>

        <!-- TOTALS & MASTER TIMESTAMP -->
        <div class="lg:col-span-3 liquid-glass rounded-[2.5rem] p-7 grid grid-cols-2 md:grid-cols-5 gap-6 shadow-xl">
            <div class="text-center md:border-r border-slate-300">
                <p class="text-[10px] font-black text-slate-600 uppercase mb-2 tracking-widest">Entlassungen</p>
                <p id="sum-entl" class="text-4xl font-black text-[#6a9a00]">0</p>
            </div>
            <div class="text-center md:border-r border-slate-300">
                <p class="text-[10px] font-black text-slate-600 uppercase mb-2 tracking-widest">Betten (M)</p>
                <p id="sum-m" class="text-4xl font-black text-[#004a99]">0</p>
            </div>
            <div class="text-center md:border-r border-slate-300">
                <p class="text-[10px] font-black text-slate-600 uppercase mb-2 tracking-widest">Betten (W)</p>
                <p id="sum-w" class="text-4xl font-black text-pink-700">0</p>
            </div>
            <div class="text-center md:border-r border-slate-300">
                <p class="text-[10px] font-black text-slate-600 uppercase mb-2 tracking-widest">Iso-Plätze</p>
                <p id="sum-iso" class="text-4xl font-black text-amber-700">0</p>
            </div>
            <div class="text-center col-span-2 md:col-span-1 bg-white border border-slate-200 rounded-3xl flex flex-col justify-center p-3 shadow-inner">
                <p class="text-[10px] font-black text-[#82bc00] uppercase mb-1 tracking-widest">Last Check</p>
                <p id="master-check-time" class="text-2xl font-black text-slate-900 tracking-tighter">--:--</p>
                <div class="mt-1 flex items-center justify-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-[#82bc00]"></span>
                    <span class="text-[9px] font-black text-slate-600 uppercase">Lokal</span>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN INTERFACE HEADER -->
    <header class="flex flex-col md:flex-row justify-between items-end mb-8 gap-6">
        <div class="flex items-center gap-5">
            <div class="w-16 h-16 bg-white rounded-[1.8rem] flex items-center justify-center shadow-xl border border-slate-200 transform -rotate-3 hover:rotate-0 transition-all duration-300">
                 <svg viewBox="0 0 24 24" class="w-10 h-10 text-[#82bc00]" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            </div>
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter leading-none mb-1">Betten-Radar</h1>
                <p class="text-[13px] font-black text-[#6a9a00] uppercase tracking-[0.4em]">Helios Duisburg</p>
            </div>
        </div>
        
        <div class="flex bg-slate-200 p-1.5 rounded-[1.8rem] shadow-inner border border-slate-300 no-print">
            <button id="tab-betten" onclick="switchTab('betten')" class="px-8 py-3 rounded-[1.4rem] text-[11px] font-black uppercase tracking-widest transition-all tab-active">🏥 Betten</button>
            <button id="tab-iso" onclick="switchTab('iso')" class="px-8 py-3 rounded-[1.4rem] text-[11px] font-black uppercase tracking-widest transition-all text-slate-700 hover:text-slate-900">☣️ Isolation</button>
        </div>
    </header>

    <!-- CONTENT TABLE -->
    <div class="liquid-glass rounded-[3rem] overflow-hidden shadow-2xl border border-slate-300 bg-white/90">
        <div class="overflow-x-auto no-scrollbar">
            <table class="w-full text-left">
                <thead id="table-head" class="bg-slate-100 border-b-2 border-[#82bc00]">
                    <!-- Dynamic Header -->
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-200">
                    <!-- Data Rows -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- FOOTER CONTROLS -->
    <footer class="mt-10 flex flex-col md:flex-row gap-6 justify-between items-center no-print">
        <div class="flex gap-3 w-full md:w-auto">
            <input type="text" id="add-station-input" placeholder="Station (z.B. 3A)" class="flex-1 md:w-72 bg-white px-6 py-4 rounded-[1.8rem] border border-slate-300 focus:ring-4 focus:ring-[#82bc00]/30 outline-none font-bold text-sm shadow-inner transition-all">
            <button onclick="addStation()" class="bg-[#82bc00] text-white px-8 py-4 rounded-[1.8rem] font-black text-[11px] uppercase tracking-widest hover:bg-[#6a9a00] transition-all shadow-xl active:scale-95 border-b-4 border-[#6a9a00]">Add+</button>
        </div>
        
        <div class="flex gap-4 items-center">
            <button onclick="resetValues()" class="bg-red-50 text-red-600 border-2 border-red-200 px-6 py-4 rounded-[1.8rem] font-black text-[11px] uppercase tracking-widest hover:bg-red-100 transition-all flex items-center gap-3 shadow-sm active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                Reset
            </button>

             <button onclick="window.print()" class="bg-slate-900 text-white px-8 py-4 rounded-[1.8rem] font-black text-[11px] uppercase tracking-widest hover:bg-black transition-all flex items-center gap-3 shadow-2xl transform hover:-translate-y-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                Drucken
            </button>
            <div class="bg-slate-100 px-6 py-4 rounded-[1.8rem] border border-slate-300 flex items-center gap-3 shadow-inner">
                <div class="w-2.5 h-2.5 rounded-full bg-green-600 shadow-[0_0_12px_rgba(22,163,74,0.6)]"></div>
                <span class="text-[10px] font-black text-slate-700 uppercase tracking-widest">Lokal Aktiv</span>
            </div>
        </div>
    </footer>
</div>

<!-- Modal für Confirmation (Henne's Security) -->
<div id="custom-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-[100] p-4 no-print">
    <div class="liquid-glass rounded-[2rem] p-8 max-w-sm w-full shadow-2xl text-center border-2 border-slate-200">
        <h4 id="modal-title" class="text-xl font-black mb-3 text-slate-900 uppercase tracking-tight">Bestätigung</h4>
        <p id="modal-text" class="text-slate-700 mb-8 font-bold leading-relaxed"></p>
        <div class="flex gap-3">
            <button id="modal-cancel" class="flex-1 bg-slate-100 text-slate-700 py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-slate-200 transition-all">Abbruch</button>
            <button id="modal-confirm" class="flex-1 bg-[#82bc00] text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg hover:bg-[#6a9a00] transition-all">Ja, sicher</button>
        </div>
    </div>
</div>

<script>
    // --- State Management ---
    let appState = {
        currentTab: 'betten',
        znaStatus: { type: 'normal', color: '#82bc00', label: 'Normalbetrieb' },
        stations: [
            { id: '1a', name: 'Station 1A', entl: 0, m: 0, w: 0, isoType: 'Keine', isoCount: 0, lastCheck: '--:--', rawTimestamp: 0 },
            { id: 'zna_holding', name: 'ZNA Holding', entl: 0, m: 0, w: 0, isoType: 'Keine', isoCount: 0, lastCheck: '--:--', rawTimestamp: 0 }
        ]
    };

    let draggedId = null;

    function loadData() {
        const saved = localStorage.getItem('helios_radar_data');
        if (saved) {
            appState = JSON.parse(saved);
        }
        updateDashboard();
        updateStatusUI();
        render();
    }

    function saveData() {
        localStorage.setItem('helios_radar_data', JSON.stringify(appState));
        updateDashboard();
    }

    // --- Tab Switch ---
    window.switchTab = function(tab) {
        appState.currentTab = tab;
        document.getElementById('tab-betten').className = `px-8 py-3 rounded-[1.4rem] text-[11px] font-black uppercase tracking-widest transition-all ${tab === 'betten' ? 'tab-active' : 'text-slate-700'}`;
        document.getElementById('tab-iso').className = `px-8 py-3 rounded-[1.4rem] text-[11px] font-black uppercase tracking-widest transition-all ${tab === 'iso' ? 'tab-active' : 'text-slate-700'}`;
        render();
        saveData();
    };

    // --- Dashboard ---
    function updateDashboard() {
        let entl = 0, m = 0, w = 0, iso = 0;
        let latestTime = "--:--";
        let latestRaw = 0;

        appState.stations.forEach(s => {
            entl += (Number(s.entl) || 0);
            m += (Number(s.m) || 0);
            w += (Number(s.w) || 0);
            iso += (Number(s.isoCount) || 0);
            if (s.rawTimestamp && s.rawTimestamp > latestRaw) {
                latestRaw = s.rawTimestamp;
                latestTime = s.lastCheck;
            }
        });

        document.getElementById('sum-entl').innerText = entl;
        document.getElementById('sum-m').innerText = m;
        document.getElementById('sum-w').innerText = w;
        document.getElementById('sum-iso').innerText = iso;
        document.getElementById('master-check-time').innerText = latestTime;
    }

    function updateStatusUI() {
        const status = appState.znaStatus;
        const panel = document.getElementById('zna-status-panel');
        const indicator = document.getElementById('zna-indicator');
        const label = document.getElementById('zna-status-label');
        
        panel.style.borderLeftColor = status.color;
        indicator.style.backgroundColor = status.color;
        label.innerText = status.label;
        label.style.color = (status.color === '#fbbf24') ? '#92400e' : status.color;
    }

    // --- Actions ---
    window.setZNAStatus = function(type, color, label) {
        appState.znaStatus = { type, color, label };
        updateStatusUI();
        saveData();
    };

    window.updateVal = function(id, field, val) {
        const station = appState.stations.find(s => s.id === id);
        if (station) {
            station[field] = (field === 'isoType' || field === 'lastCheck') ? val : (parseInt(val) || 0);
            saveData();
        }
    };

    window.markChecked = function(id) {
        const now = new Date();
        const time = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        const station = appState.stations.find(s => s.id === id);
        if (station) {
            station.lastCheck = time;
            station.rawTimestamp = now.getTime();
            render();
            saveData();
        }
    };

    // --- Drag & Drop Core ---
    window.handleDragStart = function(e, id) {
        draggedId = id;
        e.dataTransfer.effectAllowed = 'move';
        e.currentTarget.classList.add('dragging');
    };

    window.handleDragEnd = function(e) {
        e.currentTarget.classList.remove('dragging');
        draggedId = null;
    };

    window.handleDragOver = function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
    };

    window.handleDrop = function(e, targetId) {
        e.preventDefault();
        if (draggedId === targetId) return;

        const draggedIdx = appState.stations.findIndex(s => s.id === draggedId);
        const targetIdx = appState.stations.findIndex(s => s.id === targetId);
        
        const [movedItem] = appState.stations.splice(draggedIdx, 1);
        appState.stations.splice(targetIdx, 0, movedItem);
        
        saveData();
        render();
    };

    // --- Custom Modal System ---
    function showConfirm(text, onConfirm) {
        const modal = document.getElementById('custom-modal');
        const modalText = document.getElementById('modal-text');
        const btnCancel = document.getElementById('modal-cancel');
        const btnConfirm = document.getElementById('modal-confirm');

        modalText.innerText = text;
        modal.classList.remove('hidden');
        modal.classList.add('flex');

        const cleanup = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            btnCancel.removeEventListener('click', cleanup);
            btnConfirm.removeEventListener('click', confirmed);
        };

        const confirmed = () => {
            onConfirm();
            cleanup();
        };

        btnCancel.addEventListener('click', cleanup);
        btnConfirm.addEventListener('click', confirmed);
    }

    window.resetValues = function() {
        showConfirm('Alle Bettenzahlen und Entlassungen zurücksetzen? (Stationen bleiben erhalten)', () => {
            appState.stations.forEach(s => {
                s.entl = 0; s.m = 0; s.w = 0; s.isoCount = 0; s.isoType = 'Keine';
                s.lastCheck = '--:--'; s.rawTimestamp = 0;
            });
            appState.znaStatus = { type: 'normal', color: '#82bc00', label: 'Normalbetrieb' };
            saveData();
            updateStatusUI();
            render();
        });
    };

    window.addStation = function() {
        const input = document.getElementById('add-station-input');
        const name = input.value.trim();
        if (!name) return;
        const id = 'st_' + Date.now();
        appState.stations.push({
            id, name, entl: 0, m: 0, w: 0, isoType: 'Keine', isoCount: 0, lastCheck: '--:--', rawTimestamp: 0
        });
        input.value = '';
        render();
        saveData();
    };

    window.deleteStation = function(id) {
        const station = appState.stations.find(s => s.id === id);
        showConfirm(`Station "${station?.name}" wirklich aus der Liste entfernen?`, () => {
            appState.stations = appState.stations.filter(s => s.id !== id);
            render();
            saveData();
        });
    };

    // --- Rendering ---
    function render() {
        const head = document.getElementById('table-head');
        const body = document.getElementById('tableBody');
        body.innerHTML = '';

        if (appState.currentTab === 'betten') {
            head.innerHTML = `<tr>
                <th class="p-6 text-[11px] font-black uppercase text-slate-800 tracking-[0.2em] w-12"></th>
                <th class="p-6 text-[11px] font-black uppercase text-slate-800 tracking-[0.2em]">Station</th>
                <th class="p-6 text-center text-[11px] font-black uppercase text-slate-800 tracking-[0.2em]">Entlassungen</th>
                <th class="p-6 text-center text-[11px] font-black uppercase text-slate-800 tracking-[0.2em]">Betten (M)</th>
                <th class="p-6 text-center text-[11px] font-black uppercase text-slate-800 tracking-[0.2em]">Betten (W)</th>
                <th class="p-6 text-center text-[11px] font-black uppercase text-slate-800 tracking-[0.2em]">Check</th>
                <th class="p-6 text-right no-print">Optionen</th>
            </tr>`;
        } else {
            head.innerHTML = `<tr>
                <th class="p-6 text-[11px] font-black uppercase text-slate-800 tracking-[0.2em] w-12"></th>
                <th class="p-6 text-[11px] font-black uppercase text-slate-800 tracking-[0.2em]">Station</th>
                <th class="p-6 text-center text-[11px] font-black uppercase text-slate-800 tracking-[0.2em]">Isolation</th>
                <th class="p-6 text-center text-[11px] font-black uppercase text-slate-800 tracking-[0.2em]">Plätze frei</th>
                <th class="p-6 text-center text-[11px] font-black uppercase text-slate-800 tracking-[0.2em]">Zeit</th>
                <th class="p-6 text-right no-print">Optionen</th>
            </tr>`;
        }

        appState.stations.forEach(s => {
            const tr = document.createElement('tr');
            tr.className = "group hover:bg-slate-100/80 transition-all duration-300";
            tr.setAttribute('draggable', 'true');
            tr.setAttribute('ondragstart', `handleDragStart(event, '${s.id}')`);
            tr.setAttribute('ondragend', `handleDragEnd(event)`);
            tr.setAttribute('ondragover', `handleDragOver(event)`);
            tr.setAttribute('ondrop', `handleDrop(event, '${s.id}')`);
            
            const dragHandle = `<td class="p-6 text-center no-print">
                <div class="drag-handle">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 16h16" /></svg>
                </div>
            </td>`;

            if (appState.currentTab === 'betten') {
                tr.innerHTML = `
                    ${dragHandle}
                    <td class="p-6 font-black text-slate-900">${s.name}</td>
                    <td class="p-6 text-center">
                        <input type="number" value="${s.entl}" onchange="updateVal('${s.id}', 'entl', this.value)" class="w-16 p-3 rounded-2xl bg-white text-center font-black outline-none border-2 border-slate-200 focus:border-[#82bc00] shadow-sm text-slate-900">
                    </td>
                    <td class="p-6 text-center">
                        <input type="number" value="${s.m}" onchange="updateVal('${s.id}', 'm', this.value)" class="w-16 p-3 rounded-2xl bg-blue-50 text-center font-black outline-none border-2 border-blue-200 focus:border-[#82bc00] shadow-sm text-blue-900">
                    </td>
                    <td class="p-6 text-center">
                        <input type="number" value="${s.w}" onchange="updateVal('${s.id}', 'w', this.value)" class="w-16 p-3 rounded-2xl bg-pink-50 text-center font-black outline-none border-2 border-pink-200 focus:border-[#82bc00] shadow-sm text-pink-900">
                    </td>
                    <td class="p-6 text-center">
                        <span class="text-[11px] font-black text-slate-700 bg-white px-4 py-2 rounded-xl border-2 border-slate-100 shadow-inner">${s.lastCheck}</span>
                    </td>
                    <td class="p-6 text-right no-print">
                        <div class="flex justify-end gap-2">
                            <button onclick="markChecked('${s.id}')" class="p-4 bg-white rounded-2xl shadow-lg text-[#82bc00] hover:bg-[#82bc00] hover:text-white border border-slate-200 transform hover:rotate-12 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                            </button>
                            <button onclick="deleteStation('${s.id}')" class="opacity-0 group-hover:opacity-100 p-4 bg-white rounded-2xl shadow-lg text-red-500 hover:bg-red-500 hover:text-white border border-slate-200 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </td>
                `;
            } else {
                tr.innerHTML = `
                    ${dragHandle}
                    <td class="p-6 font-black text-slate-900">${s.name}</td>
                    <td class="p-6 text-center">
                        <select onchange="updateVal('${s.id}', 'isoType', this.value)" class="p-3 rounded-2xl bg-white font-black outline-none text-[11px] uppercase shadow-sm border-2 border-slate-200 focus:border-[#82bc00] text-slate-900">
                            ${['Keine', 'MRSA', 'Noro', 'Influenza', 'Corona', 'Andere'].map(t => `<option ${s.isoType === t ? 'selected' : ''}>${t}</option>`).join('')}
                        </select>
                    </td>
                    <td class="p-6 text-center">
                        <input type="number" value="${s.isoCount}" onchange="updateVal('${s.id}', 'isoCount', this.value)" class="w-16 p-3 rounded-2xl bg-amber-50 text-center font-black outline-none border-2 border-amber-200 focus:border-[#82bc00] shadow-sm text-amber-900">
                    </td>
                    <td class="p-6 text-center text-[11px] font-black text-slate-700">${s.lastCheck}</td>
                    <td class="p-6 text-right no-print">
                        <button onclick="deleteStation('${s.id}')" class="opacity-0 group-hover:opacity-100 p-4 bg-white rounded-2xl shadow-lg text-red-500 hover:bg-red-500 hover:text-white border border-slate-200 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </td>
                `;
            }
            body.appendChild(tr);
        });
    }

    // Initialize
    loadData();
</script>
</body>
</html>
